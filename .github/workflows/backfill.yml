name: Backfill Commits

on:
  schedule:
    # Run every hour to use each rate limit window
    - cron: '5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run backfill
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          node --max-old-space-size=512 ./node_modules/.bin/tsx scripts/backfill-cron.ts 2026-01-01 $TODAY
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_ORG: Sofamon
          FETCH_BRANCH_MODE: all
          FETCH_MAX_BRANCHES_PER_REPO: '50'

      - name: Invalidate dashboard cache
        if: success() && vars.SITE_URL != ''
        run: |
          curl -sS -X POST "${{ vars.SITE_URL }}/api/revalidate?secret=${{ secrets.CRON_SECRET }}" \
            --fail --max-time 15 || echo "revalidate call failed (non-fatal)"
